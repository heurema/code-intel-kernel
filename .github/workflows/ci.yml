name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deterministic-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        # pinned from actions/checkout@v5.0.1
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Tool versions
        run: |
          rustc --version
          cargo --version
          python3 --version

      - name: Run deterministic tests
        run: bash scripts/run-deterministic-tests.sh
